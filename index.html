<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#203b2b" />
    <meta name="description" content="AGRIsence ESP32 NPK monitoring and control dashboard" />
    <title>AGRIsence IoT Dashboard</title>
    <link rel="manifest" href="./manifest.webmanifest?v=1" />
    <link rel="icon" href="./icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon-192.svg" />
    <link rel="stylesheet" href="./styles.css?v=2" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel">
        <div class="brand-row">
          <div>
            <p class="eyebrow">AGRIsence</p>
            <h1>ESP32 Device</h1>
          </div>
          <button id="refreshButton" class="refresh-button" type="button" title="Fetch NPK data">
            Refresh
          </button>
        </div>

        <div class="device-card">
          <div class="device-main">
            <span id="connectionDot" class="status-dot checking"></span>
            <div>
              <p class="label">Device ID</p>
              <h2 id="deviceState">esp32_01</h2>
            </div>
          </div>
          <div class="status-copy">
            <strong id="onlineState">Checking...</strong>
            <span id="lastUpdated">Ready to request stored NPK data</span>
          </div>
        </div>
      </section>

      <section class="menu-panel" aria-label="Menu options">
        <button class="menu-button active" type="button" data-view="liveView">
          <span>Live Data</span>
          <small>NPK values</small>
        </button>
        <button class="menu-button" type="button" data-view="controlView">
          <span>Control Panel</span>
          <small>Motor control</small>
        </button>
      </section>

      <section id="liveView" class="view-section active">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Live Data</p>
            <h2>What we are getting</h2>
          </div>
          <p id="requestState" class="muted">Ready</p>
        </div>

        <form id="dataRequestForm" class="data-form">
          <div class="field-grid">
            <label>
              Device ID
              <input id="deviceId" name="deviceId" type="text" value="esp32_01" />
            </label>
            <label>
              Start Date
              <input id="startDate" name="startDate" type="text" value="18/6/2026" />
            </label>
            <label>
              End Date
              <input id="endDate" name="endDate" type="text" value="18/6/2026" />
            </label>
          </div>
          <button class="primary-action" type="submit">Read NPK Values</button>
        </form>

        <div class="npk-grid" aria-label="Latest NPK values">
          <article class="metric-card nitrogen">
            <p class="label">Nitrogen</p>
            <h2 id="nitrogenValue">--</h2>
          </article>
          <article class="metric-card phosphorus">
            <p class="label">Phosphorus</p>
            <h2 id="phosphorusValue">--</h2>
          </article>
          <article class="metric-card potassium">
            <p class="label">Potassium</p>
            <h2 id="potassiumValue">--</h2>
          </article>
        </div>
      </section>

      <section id="controlView" class="view-section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Control Panel</p>
            <h2>Motor Control</h2>
          </div>
        </div>

        <div class="control-grid">
          <button id="motorOnButton" class="motor-button on" type="button">Motor ON</button>
          <button id="motorOffButton" class="motor-button off" type="button">Motor OFF</button>
        </div>
      </section>

      <section class="message-panel">
        <div class="section-heading compact">
          <div>
            <p class="eyebrow">Messages</p>
            <h2>Latest API Data</h2>
          </div>
        </div>
        <pre id="messageOutput">No messages yet.</pre>
      </section>
    </main>

    <script src="./script.js?v=4"></script>
  </body>
</html>
